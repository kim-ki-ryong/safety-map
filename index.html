<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>안전진단 위치도 생성기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', sans-serif; background: #f4f4f0; color: #222; font-size: 14px; height: 100vh; overflow: hidden; }
  header { background: #1a1a2e; color: #fff; padding: 12px 24px; display: flex; align-items: center; gap: 12px; height: 52px; }
  header .logo { background: #FFD600; color: #1a1a2e; font-weight: 700; font-size: 12px; padding: 3px 10px; border-radius: 6px; }
  header h1 { font-size: 17px; font-weight: 600; }
  header span { font-size: 12px; color: #aaa; margin-left: 8px; }
  .container { display: flex; height: calc(100vh - 52px); }
  .sidebar { width: 320px; min-width: 280px; background: #fff; border-right: 1px solid #e0e0d8; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-inner { flex: 1; overflow-y: auto; padding: 14px; }
  .section { margin-bottom: 16px; }
  .section-title { font-size: 11px; font-weight: 700; color: #888; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
  textarea { width: 100%; height: 200px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 12px; font-family: 'Consolas', monospace; resize: vertical; background: #fafaf8; color: #222; line-height: 1.6; }
  textarea:focus { outline: none; border-color: #1a6dff; }
  .hint { font-size: 11px; color: #999; margin-top: 5px; line-height: 1.5; }
  .err { font-size: 12px; color: #c0392b; margin-top: 5px; min-height: 16px; }
  .color-row { display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; }
  .color-dot { width: 24px; height: 24px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; transition: transform 0.1s; }
  .color-dot.active { border-color: #333; transform: scale(1.2); }
  .opt-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .opt-row label { font-size: 12px; display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .opt-row input[type=range] { flex: 1; }
  .opt-val { font-size: 12px; min-width: 36px; text-align: right; color: #555; }
  .sidebar-footer { padding: 12px 14px; border-top: 1px solid #e0e0d8; display: flex; flex-direction: column; gap: 8px; }
  .btn-row { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 9px 8px; border-radius: 8px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-size: 13px; font-family: inherit; color: #333; transition: background 0.15s; text-align: center; }
  .btn:hover { background: #f0f0ec; }
  .btn.primary { background: #1a6dff; color: #fff; border-color: #1a6dff; font-weight: 600; }
  .btn.primary:hover { background: #155ed4; }
  .btn.red { color: #c0392b; border-color: #f5c6c6; }
  .btn.red:hover { background: #fef0f0; }
  .btn.full { width: 100%; flex: none; }
  .list-wrap { border-top: 1px solid #e0e0d8; padding: 10px 14px; max-height: 220px; overflow-y: auto; }
  .list-title { font-size: 11px; font-weight: 700; color: #888; margin-bottom: 8px; }
  .fac-item { display: flex; align-items: flex-start; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f0f0ec; font-size: 12px; }
  .fac-item:last-child { border-bottom: none; }
  .fac-num { width: 20px; height: 20px; border-radius: 4px; color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .fac-name { font-weight: 600; color: #222; }
  .fac-addr { color: #888; font-size: 11px; margin-top: 1px; }
  .badge { font-size: 10px; padding: 1px 6px; border-radius: 4px; flex-shrink: 0; margin-top: 2px; }
  .badge.ok { background: #e8f5e9; color: #2e7d32; }
  .badge.fail { background: #fef0f0; color: #c0392b; }
  #mapWrap { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }
  .map-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: #aaa; background: #f0ece4; z-index: 1000; }
  .map-placeholder p { font-size: 14px; text-align: center; line-height: 1.7; }
  .map-tools { position: absolute; top: 10px; right: 10px; display: flex; flex-direction: column; gap: 6px; z-index: 500; }
  .map-tool-btn { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 7px 12px; font-size: 12px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.12); font-family: inherit; color: #333; }
  .map-tool-btn:hover { background: #f5f5f5; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
</style>
</head>
<body>
<header>
  <div class="logo">안전진단</div>
  <h1>위치도 생성기</h1>
  <span>시설물 주소 입력 → 카카오맵 자동 표시 → 캡처</span>
</header>
<div class="container">
  <div class="sidebar">
    <div class="sidebar-inner">
      <div class="section">
        <div class="section-title">시설물 목록</div>
        <textarea id="input" placeholder="엑셀에서 시설물명·주소 두 열 복붙하거나 직접 입력:

시설물명[탭]주소

예시)
매교역 1번출구	경기도 수원시 팔달구 매산로 지하 1
수원천 교량	경기도 수원시 팔달구 수원천로 11
영통고가차도	경기도 수원시 영통구 영통로 200"></textarea>
        <p class="hint">엑셀에서 두 열 드래그 → 복붙하면 탭으로 자동 구분</p>
        <p class="err" id="inputErr"></p>
      </div>
      <div class="section">
        <div class="section-title">표시 옵션</div>
        <div style="margin-bottom:10px">
          <div style="font-size:12px;color:#666;margin-bottom:5px">박스 색상</div>
          <div class="color-row" id="colorPicker">
            <div class="color-dot active" data-c="#1a6dff" style="background:#1a6dff"></div>
            <div class="color-dot" data-c="#e74c3c" style="background:#e74c3c"></div>
            <div class="color-dot" data-c="#e67e22" style="background:#e67e22"></div>
            <div class="color-dot" data-c="#27ae60" style="background:#27ae60"></div>
            <div class="color-dot" data-c="#8e44ad" style="background:#8e44ad"></div>
            <div class="color-dot" data-c="#2c3e50" style="background:#2c3e50"></div>
          </div>
        </div>
        <div style="margin-bottom:10px">
          <div style="font-size:12px;color:#666;margin-bottom:5px">박스 크기</div>
          <div class="opt-row">
            <input type="range" id="boxSize" min="40" max="140" value="80" step="5">
            <span class="opt-val" id="boxSizeVal">80px</span>
          </div>
        </div>
        <div style="margin-bottom:10px">
          <div style="font-size:12px;color:#666;margin-bottom:5px">라벨 표시</div>
          <div class="opt-row" style="gap:14px">
            <label><input type="radio" name="label" value="name" checked> 시설물명</label>
            <label><input type="radio" name="label" value="num"> 번호만</label>
            <label><input type="radio" name="label" value="both"> 번호+이름</label>
          </div>
        </div>
        <div>
          <div style="font-size:12px;color:#666;margin-bottom:5px">지도 타입</div>
          <div class="opt-row" style="gap:14px">
            <label><input type="radio" name="maptype" value="normal" checked> 일반</label>
            <label><input type="radio" name="maptype" value="hybrid"> 스카이뷰+도로</label>
          </div>
        </div>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="btn-row">
        <button class="btn primary" onclick="loadMap()">🗺 지도에 표시</button>
        <button class="btn" onclick="loadSample()">샘플</button>
        <button class="btn red" onclick="clearAll()">초기화</button>
      </div>
      <button class="btn full" onclick="fitBounds()">📍 전체 보기</button>
      <button class="btn full" onclick="showCaptureGuide()">📷 캡처 방법 안내</button>
    </div>
    <div class="list-wrap" id="listWrap" style="display:none">
      <div class="list-title">시설물 목록 <span id="listCount"></span></div>
      <div id="listItems"></div>
    </div>
  </div>
  <div id="mapWrap">
    <div class="map-placeholder" id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.2">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
      </svg>
      <p>시설물 목록 입력 후<br>"지도에 표시" 클릭</p>
    </div>
    <div id="map" style="display:none;width:100%;height:100%"></div>
    <div class="map-tools" id="mapTools" style="display:none">
      <button class="map-tool-btn" onclick="toggleMapType()">🛰 위성/일반 전환</button>
    </div>
  </div>
</div>

<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=44dcd38a363fa2dd7f233cf323e7f788&libraries=services"></script>
<script>
let boxColor = '#1a6dff';
let mapInstance = null;
let overlays = [];
let facilities = [];
let geocoder = null;

document.getElementById('boxSize').addEventListener('input', function(){
  document.getElementById('boxSizeVal').textContent = this.value + 'px';
  if(mapInstance) redrawOverlays();
});

document.querySelectorAll('input[name="label"]').forEach(r => {
  r.addEventListener('change', () => { if(mapInstance) redrawOverlays(); });
});

document.querySelectorAll('input[name="maptype"]').forEach(r => {
  r.addEventListener('change', function() {
    if(!mapInstance) return;
    mapInstance.setMapTypeId(this.value === 'hybrid' ? kakao.maps.MapTypeId.HYBRID : kakao.maps.MapTypeId.ROADMAP);
  });
});

document.getElementById('colorPicker').addEventListener('click', function(e) {
  const dot = e.target.closest('.color-dot');
  if(!dot) return;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  dot.classList.add('active');
  boxColor = dot.dataset.c;
  if(mapInstance) redrawOverlays();
});

function parseInput() {
  const raw = document.getElementById('input').value.trim();
  if(!raw) return [];
  return raw.split('\n').filter(l => l.trim()).map((line, i) => {
    const parts = line.includes('\t') ? line.split('\t') : line.split(',');
    if(parts.length < 2) return null;
    return { num: i+1, name: parts[0].trim(), addr: parts.slice(1).join(',').trim(), found: false };
  }).filter(Boolean);
}

function loadSample() {
  document.getElementById('input').value =
`매교역 1번출구	경기도 수원시 팔달구 매산로 지하 1
수원천 교량	경기도 수원시 팔달구 수원천로 11
영통고가차도	경기도 수원시 영통구 영통로 200
광교호수 교량	경기도 수원시 영통구 광교호수공원로 1
수원역 지하보도	경기도 수원시 권선구 권선로 1`;
}

function clearAll() {
  document.getElementById('input').value = '';
  document.getElementById('inputErr').textContent = '';
  facilities = [];
  if(mapInstance) { overlays.forEach(o=>o.setMap(null)); overlays = []; }
  document.getElementById('listWrap').style.display = 'none';
  document.getElementById('mapTools').style.display = 'none';
  document.getElementById('map').style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
}

function getLabelText(f) {
  const mode = document.querySelector('input[name="label"]:checked').value;
  if(mode === 'num') return String(f.num);
  if(mode === 'name') return f.name;
  return f.num + '. ' + f.name;
}

function makeOverlayContent(f) {
  const size = parseInt(document.getElementById('boxSize').value);
  const half = Math.round(size / 2);
  const label = getLabelText(f);
  return `<div style="width:${size}px;height:${size}px;border:2.5px solid ${boxColor};border-radius:3px;background:rgba(255,255,255,0.05);position:relative;transform:translate(-${half}px,-${half}px);pointer-events:none;">
    <div style="position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);background:${boxColor};color:#fff;font-size:10px;font-weight:700;font-family:'Malgun Gothic',sans-serif;padding:2px 6px;border-radius:0 0 2px 2px;white-space:nowrap;max-width:${size+80}px;overflow:hidden;text-overflow:ellipsis;">${label}</div>
  </div>`;
}

function redrawOverlays() {
  overlays.forEach(o => o.setMap(null));
  overlays = [];
  facilities.filter(f => f.found).forEach(f => {
    const o = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(f.lat, f.lng),
      content: makeOverlayContent(f),
      zIndex: 3
    });
    o.setMap(mapInstance);
    overlays.push(o);
  });
}

function fitBounds() {
  if(!mapInstance) return;
  const found = facilities.filter(f => f.found);
  if(!found.length) return;
  const bounds = new kakao.maps.LatLngBounds();
  found.forEach(f => bounds.extend(new kakao.maps.LatLng(f.lat, f.lng)));
  mapInstance.setBounds(bounds, 80);
}

function toggleMapType() {
  if(!mapInstance) return;
  const hybrid = document.querySelector('input[name="maptype"][value="hybrid"]');
  const normal = document.querySelector('input[name="maptype"][value="normal"]');
  if(hybrid.checked) {
    mapInstance.setMapTypeId(kakao.maps.MapTypeId.ROADMAP);
    normal.checked = true;
  } else {
    mapInstance.setMapTypeId(kakao.maps.MapTypeId.HYBRID);
    hybrid.checked = true;
  }
}

function loadMap() {
  facilities = parseInput();
  if(!facilities.length) {
    document.getElementById('inputErr').textContent = '시설물 목록을 입력해주세요.';
    return;
  }
  document.getElementById('inputErr').textContent = '';
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('map').style.display = 'block';

  if(!mapInstance) {
    mapInstance = new kakao.maps.Map(document.getElementById('map'), {
      center: new kakao.maps.LatLng(36.5, 127.5),
      level: 12
    });
    geocoder = new kakao.maps.services.Geocoder();
  }

  overlays.forEach(o => o.setMap(null));
  overlays = [];

  const bounds = new kakao.maps.LatLngBounds();
  let done = 0;

  const mt = document.querySelector('input[name="maptype"]:checked').value;
  mapInstance.setMapTypeId(mt === 'hybrid' ? kakao.maps.MapTypeId.HYBRID : kakao.maps.MapTypeId.ROADMAP);

  facilities.forEach(f => {
    geocoder.addressSearch(f.addr, function(result, status) {
      done++;
      if(status === kakao.maps.services.Status.OK) {
        f.lat = parseFloat(result[0].y);
        f.lng = parseFloat(result[0].x);
        f.found = true;
        bounds.extend(new kakao.maps.LatLng(f.lat, f.lng));
        const o = new kakao.maps.CustomOverlay({
          position: new kakao.maps.LatLng(f.lat, f.lng),
          content: makeOverlayContent(f),
          zIndex: 3
        });
        o.setMap(mapInstance);
        overlays.push(o);
      }
      if(done === facilities.length) {
        if(facilities.filter(f=>f.found).length > 0) mapInstance.setBounds(bounds, 80);
        document.getElementById('mapTools').style.display = 'flex';
        renderList();
      }
    });
  });
}

function renderList() {
  document.getElementById('listWrap').style.display = 'block';
  document.getElementById('listCount').textContent = `(${facilities.length}개)`;
  document.getElementById('listItems').innerHTML = facilities.map(f => `
    <div class="fac-item">
      <div class="fac-num" style="background:${boxColor}">${f.num}</div>
      <div style="flex:1;min-width:0">
        <div class="fac-name">${f.name}</div>
        <div class="fac-addr">${f.addr}</div>
      </div>
      <span class="badge ${f.found?'ok':'fail'}">${f.found?'찾음':'주소오류'}</span>
    </div>
  `).join('');
}

function showCaptureGuide() {
  alert('📷 지도 캡처 방법\n\nWin + Shift + S\n→ 지도 영역 드래그\n→ 파워포인트에 바로 붙여넣기\n\n또는 스니핑 도구 사용');
}
</script>
</body>
</html>
